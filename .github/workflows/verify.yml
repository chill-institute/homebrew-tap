name: Verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: macos-latest
    timeout-minutes: 20
    env:
      CHILL_TAP_INSTALL_SMOKE: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify tap
        run: ./scripts/verify.sh
